version: 2
models:
  - name: stg_prospects
    description: Cleaned list of marketing prospects targeted in the campaign, one row per prospect.
    columns:
      - name: prospect_id
        description: Unique identifier for each prospect contacted during the campaign.
        tests: [unique, not_null]
      - name: market
        description: "Baltic country the prospect belongs to: Latvia, Lithuania, or Estonia."
        tests:
          - accepted_values:
              arguments:
                values: ['LV', 'LT', 'EE']
      - name: acquisition_channel
        description: Marketing channel through which the prospect was first reached.
      - name: engagement_score
        description: Measure of how actively the prospect interacted with marketing before any purchase.
      - name: converted
        description: Whether the prospect went on to make a purchase or not.
  - name: stg_orders
    description: Cleaned record of individual purchases, one row per order placed by a customer.
    columns:
      - name: order_id
        description: Unique identifier for each individual order placed.
        tests: [unique, not_null]
      - name: customer_id
        description: Identifier of the customer who placed the order.
      - name: prospect_id
        description: Identifier linking the order back to the original prospect record.
        tests:
          - relationships:
              arguments:
                to: ref('stg_prospects')
                field: prospect_id
      - name: order_date
        description: Date on which the order was placed.
      - name: market
        description: "Baltic country where the order was placed: Latvia, Lithuania, or Estonia."
      - name: acquisition_channel
        description: Marketing channel that originally acquired the ordering customer.
      - name: net_revenue
        description: Revenue from the order after discounts and refunds are removed.
      - name: contribution_margin
        description: Profit from the order after variable fulfilment costs and refunds are deducted.
  - name: stg_customers
    description: Cleaned list of prospects who became paying customers, one row per customer.
    columns:
      - name: customer_id
        description: Unique identifier for each customer who made at least one purchase.
      - name: prospect_id
        description: Identifier linking the customer back to their original prospect record.
      - name: market
        description: "Baltic country the customer is based in: Latvia, Lithuania, or Estonia."
      - name: acquisition_channel
        description: Marketing channel that originally acquired this customer.
      - name: acquisition_date
        description: Date the prospect became a paying customer.
  - name: mart_customer_profitability
    description: Lifetime value and profitability summary for each customer across all their orders.
    columns:
      - name: customer_id
        description: Unique identifier for each customer summarised in this table.
        tests: [unique, not_null]
      - name: prospect_id
        description: Identifier linking the customer back to their original prospect record.
      - name: market
        description: "Baltic country the customer is based in: Latvia, Lithuania, or Estonia."
      - name: acquisition_channel
        description: Marketing channel that originally acquired this customer.
      - name: first_order_date
        description: Date of the customer's first-ever order.
      - name: latest_order_date
        description: Date of the customer's most recent order.
      - name: lifetime_orders
        description: Total number of distinct orders the customer has placed.
      - name: lifetime_net_revenue
        description: Total revenue from the customer after discounts and refunds, across all orders.
      - name: lifetime_contribution_margin
        description: Total profit from the customer after variable costs and refunds, across all orders.
      - name: active_span_days
        description: Number of days between the customer's first and most recent order.
  - name: mart_channel_funnel
    description: Acquisition-channel summary comparing prospect volume, conversion, and profit contribution.
    columns:
      - name: acquisition_channel
        description: Marketing channel being summarised in this row.
        tests: [unique, not_null]
      - name: prospects
        description: Total number of prospects reached through this channel.
      - name: converted_prospects
        description: Number of prospects from this channel who became paying customers.
      - name: conversion_rate
        description: Share of this channel's prospects that converted into customers.
      - name: contribution_margin
        description: Total profit generated by this channel after variable costs and refunds.
