version: 2

models:
  - name: mart_customer_profitability
    description: One row per customer with trusted lifetime profitability metrics.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: market
        tests:
          - accepted_values:
              values: ['LV', 'LT', 'EE']
      - name: lifetime_net_revenue
        tests:
          - not_null

